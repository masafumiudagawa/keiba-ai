name: Render Keep-Alive

on:
  schedule:
    # 5分ごとにRenderをping（スリープ防止）
    - cron: '*/5 * * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://keiba-ai-0tll.onrender.com/api/health)
          echo "Health check: HTTP $response"
          if [ "$response" != "200" ]; then
            echo "::warning::Health check returned $response"
          fi
