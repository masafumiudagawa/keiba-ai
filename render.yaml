services:
  - type: web
    name: keiba-ai
    runtime: python
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: NODE_VERSION
        value: "20"
    plan: free
