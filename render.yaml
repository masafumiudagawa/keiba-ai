services:
  - type: web
    name: keiba-ai
    runtime: python
    buildCommand: "pip3 install -r requirements.txt && cd frontend && npm install && npm run build"
    startCommand: "python3 -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: NODE_VERSION
        value: "20"
      - key: RENDER_EXTERNAL_URL
        value: "https://keiba-ai-0tll.onrender.com"
    plan: free
